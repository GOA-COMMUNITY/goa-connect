name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Refresh latest YouTube Shorts list
        run: bun run videos:update || echo "Keeping existing videos.json"

      - name: Build (static SPA)
        run: bun run build

      - name: Locate static output
        id: out
        run: |
          if [ -d "dist/client" ]; then
            echo "dir=dist/client" >> "$GITHUB_OUTPUT"
          elif [ -d "dist" ] && [ -f "dist/index.html" ]; then
            echo "dir=dist" >> "$GITHUB_OUTPUT"
          elif [ -d ".output/public" ]; then
            echo "dir=.output/public" >> "$GITHUB_OUTPUT"
          else
            echo "No static output found"; ls -la; exit 1
          fi

      - name: Ensure CNAME and SPA 404 fallback
        run: |
          DIR="${{ steps.out.outputs.dir }}"
          if [ -f public/CNAME ]; then cp public/CNAME "$DIR/CNAME"; fi
          # SPA fallback so client-side routes work on hard refresh
          if [ -f "$DIR/index.html" ] && [ ! -f "$DIR/404.html" ]; then
            cp "$DIR/index.html" "$DIR/404.html"
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.out.outputs.dir }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
